<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duka Controller</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h1 span { color: #60a5fa; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #searchBtn {
      background: #3b82f6;
      color: #fff;
    }

    #status {
      font-size: 0.85rem;
      color: #94a3b8;
      min-height: 1.2em;
    }

    #outdoor-bar {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 1.5rem;
      min-height: 1.2em;
    }

    #outdoor-bar span { color: #94a3b8; }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 1.25rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .device-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      cursor: pointer;
      border-bottom: 1px dashed transparent;
      transition: border-color 0.15s;
    }

    .device-name:hover { border-color: #475569; }

    .device-name-input {
      font-size: 0.95rem;
      font-weight: 600;
      background: #151722;
      color: #e2e8f0;
      border: 1px solid #3b82f6;
      border-radius: 4px;
      padding: 0.1rem 0.3rem;
      width: 100%;
      outline: none;
    }

    .device-id {
      font-size: 0.75rem;
      color: #64748b;
    }

    .device-ip {
      font-size: 0.75rem;
      color: #64748b;
    }

    .pill {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      letter-spacing: 0.03em;
    }

    .pill.on           { background: #14532d; color: #4ade80; }
    .pill.off          { background: #27272a; color: #71717a; }
    .pill.unreachable  { background: #450a0a; color: #f87171; }

    .card.unreachable {
      opacity: 0.5;
    }

    .card.unreachable .speed-section input,
    .card.unreachable .mode-btn {
      pointer-events: none;
      opacity: 0.4;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .stat {
      background: #151722;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #64748b;
      margin-bottom: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: #cbd5e1;
    }

    .stat-value.highlight { color: #60a5fa; }

    .card-footer {
      margin-top: 0.9rem;
      display: flex;
      justify-content: flex-end;
    }

    .refreshBtn {
      background: #1e293b;
      color: #94a3b8;
      font-size: 0.8rem;
      padding: 0.35rem 0.9rem;
    }

    .speed-section {
      margin-top: 0.9rem;
      background: #151722;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
    }

    .speed-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.4rem;
    }

    .speed-header-label {
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .speed-header-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: #60a5fa;
    }

    .speed-section input[type=range] {
      width: 100%;
      accent-color: #3b82f6;
      cursor: pointer;
    }

    .mode-section {
      margin-top: 0.6rem;
      background: #151722;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
    }

    .mode-section .stat-label { margin-bottom: 0.5rem; }

    .mode-buttons {
      display: flex;
      gap: 0.4rem;
    }

    .mode-btn {
      flex: 1;
      background: #1e2130;
      color: #64748b;
      font-size: 0.78rem;
      padding: 0.3rem 0;
      border-radius: 6px;
      border: 1px solid #2d3348;
    }

    .mode-btn.active {
      background: #1e3a5f;
      color: #60a5fa;
      border-color: #3b82f6;
    }

    .no-status {
      font-size: 0.8rem;
      color: #475569;
      font-style: italic;
    }

    #empty {
      color: #475569;
      font-size: 0.9rem;
      margin-top: 2rem;
    }

    .automation-section {
      margin-top: 0.6rem;
      background: #151722;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
    }

    .automation-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }

    .auto-toggle-btn {
      background: none;
      color: #64748b;
      font-size: 0.7rem;
      padding: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .auto-toggle-btn:hover { color: #94a3b8; opacity: 1; }

    .auto-chevron {
      display: inline-block;
      transition: transform 0.15s;
      font-style: normal;
    }

    .auto-chevron.collapsed { transform: rotate(-90deg); }

    .auto-enable-btn {
      background: #1e3a5f;
      color: #60a5fa;
      font-size: 0.78rem;
      padding: 0.2rem 0.7rem;
      border: 1px solid #3b82f6;
      border-radius: 6px;
    }

    .auto-disable-btn {
      background: #27272a;
      color: #71717a;
      font-size: 0.78rem;
      padding: 0.2rem 0.7rem;
      border-radius: 6px;
    }

    .auto-row {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }

    .auto-field {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .auto-field-label {
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      width: 2.5rem;
    }

    .speed-btns { display: flex; gap: 0.2rem; }

    .speed-btn {
      width: 1.8rem;
      height: 1.8rem;
      padding: 0;
      background: #1e2130;
      color: #64748b;
      font-size: 0.8rem;
      border: 1px solid #2d3348;
      border-radius: 4px;
    }

    .speed-btn.active {
      background: #1e3a5f;
      color: #60a5fa;
      border-color: #3b82f6;
    }

    .auto-temp-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .auto-temp-input {
      width: 4.5rem;
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 0.85rem;
      padding: 0.15rem 0.4rem;
      outline: none;
    }

    .auto-temp-input:focus { border-color: #3b82f6; }

    .auto-temp-note {
      font-size: 0.7rem;
      color: #475569;
      font-style: italic;
    }
  </style>
</head>
<body>
  <header>
    <h1>Duka <span>Controller</span></h1>
    <div style="display:flex;gap:0.5rem;align-items:center">
      <button id="searchBtn" onclick="searchDevices()">Search for devices</button>
      <form method="POST" action="/logout" style="margin:0">
        <button type="submit" style="background:#1e293b;color:#94a3b8">Log out</button>
      </form>
    </div>
  </header>

  <p id="status"></p>
  <p id="outdoor-bar"></p>

  <div id="grid"></div>
  <p id="empty" hidden>No devices found. Try searching.</p>

  <script>
    let devices = {};
    const autoExpanded = new Set();

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    async function loadOutdoor() {
      try {
        const res = await fetch('/outdoor');
        const data = await res.json();
        const bar = document.getElementById('outdoor-bar');
        if (data && data.temp_c != null && data.rh != null) {
          const ah = absoluteHumidity(data.temp_c, data.rh).toFixed(1);
          bar.innerHTML = `Outdoor: <span>${data.temp_c.toFixed(1)} °C, ${data.rh} % RH — ${ah} g/m³ abs.</span>`;
        } else {
          bar.textContent = '';
        }
      } catch (_) {}
    }

    async function searchDevices() {
      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      setStatus('Searching…');
      try {
        const res = await fetch('/devices/search', { method: 'POST' });
        const data = await res.json();
        setStatus(`Search complete — ${data.found ?? 0} device(s) found.`);
        await loadDevices();
      } catch (e) {
        setStatus('Search failed: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function loadDevices() {
      const res = await fetch('/devices');
      const list = await res.json();
      devices = {};
      for (const d of list) devices[d.id] = d;
      render();
    }

    async function saveNickname(id, value) {
      const nickname = value.trim();
      try {
        await fetch(`/devices/${encodeURIComponent(id)}/nickname`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname }),
        });
        // SSE will push the updated device back; no need to manually re-render.
      } catch (e) {
        setStatus('Error saving nickname: ' + e.message);
      }
    }

    function startEditNickname(id) {
      const nameEl = document.getElementById(`name-${id}`);
      const current = nameEl.dataset.value;
      const input = document.createElement('input');
      input.className = 'device-name-input';
      input.value = current;

      function commit() {
        const value = input.value.trim();
        // Put the span back immediately so render() is no longer blocked.
        nameEl.dataset.value = value;
        nameEl.textContent = value || devices[id]?.id || id;
        input.replaceWith(nameEl);
        saveNickname(id, value);
      }

      input.onblur = commit;
      input.onkeydown = (e) => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { input.value = current; input.onblur = null; input.replaceWith(nameEl); }
      };
      nameEl.replaceWith(input);
      input.focus();
      input.select();
    }

    async function setMode(id, mode) {
      try {
        await fetch(`/devices/${encodeURIComponent(id)}/mode`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode }),
        });
      } catch (e) {
        setStatus('Error setting mode: ' + e.message);
      }
    }

    async function setSpeed(id, speed) {
      setStatus(`Setting speed ${speed} on ${id}…`);
      try {
        const res = await fetch(`/devices/${encodeURIComponent(id)}/speed`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ speed }),
        });
        const data = await res.json();
        if (data.id) {
          devices[data.id] = data;
          render();
          setStatus('');
        } else {
          setStatus('Error: ' + (data.error ?? 'unknown'));
        }
      } catch (e) {
        setStatus('Error: ' + e.message);
      }
    }

    async function saveAutomation(id, enabled, minSpeed, maxSpeed, indoorTemp) {
      const body = { enabled: !!enabled };
      if (minSpeed != null) body.min_speed = minSpeed;
      if (maxSpeed != null) body.max_speed = maxSpeed;
      if (indoorTemp != null) body.assumed_indoor_temp_c = indoorTemp;
      try {
        await fetch(`/devices/${encodeURIComponent(id)}/automation`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
      } catch (e) {
        setStatus('Error saving automation: ' + e.message);
      }
    }

    function enableAutomation(id) {
      const d = devices[id];
      saveAutomation(id, true, d?.automation_min_speed ?? 1, d?.automation_max_speed ?? 3, d?.assumed_indoor_temp_c ?? null);
    }

    function disableAutomation(id) {
      const d = devices[id];
      saveAutomation(id, false, d?.automation_min_speed ?? null, d?.automation_max_speed ?? null, d?.assumed_indoor_temp_c ?? null);
    }

    function setAutomationSpeed(id, which, value) {
      const d = devices[id];
      const min = which === 'min' ? value : (d?.automation_min_speed ?? 1);
      const max = which === 'max' ? value : (d?.automation_max_speed ?? 3);
      saveAutomation(id, d?.automation_enabled ?? false, min, max, d?.assumed_indoor_temp_c ?? null);
    }

    function saveAutomationTemp(id, value) {
      const d = devices[id];
      const temp = parseFloat(value);
      if (isNaN(temp)) return;
      saveAutomation(id, d?.automation_enabled ?? false, d?.automation_min_speed ?? null, d?.automation_max_speed ?? null, temp);
    }

    async function refreshStatus(id) {
      setStatus(`Fetching status for ${id}…`);
      try {
        const res = await fetch(`/devices/${encodeURIComponent(id)}/status`);
        const data = await res.json();
        if (data.id) {
          devices[data.id] = data;
          render();
          setStatus('');
        } else {
          setStatus('Error: ' + (data.error ?? 'unknown'));
        }
      } catch (e) {
        setStatus('Error: ' + e.message);
      }
    }

    function absoluteHumidity(tempC, rhPercent) {
      const eSat = 6.112 * Math.exp((17.67 * tempC) / (tempC + 243.5));
      return (eSat * rhPercent * 2.1674) / (273.15 + tempC);
    }

    function modeLabel(mode) {
      return { one_way: 'One-way', two_way: 'Two-way', in: 'Intake' }[mode] ?? mode ?? '—';
    }

    function toggleAutomation(id) {
      if (autoExpanded.has(id)) autoExpanded.delete(id);
      else autoExpanded.add(id);
      const device = devices[id];
      if (device) {
        const existing = document.getElementById(`card-${device.id}`);
        if (existing) existing.outerHTML = renderCard(device);
      }
    }

    function renderAutomation(device) {
      const id = device.id;
      const eid = escapeHtml(id);
      const enabled = !!device.automation_enabled;
      const collapsed = !autoExpanded.has(id);
      const min = device.automation_min_speed ?? 1;
      const max = device.automation_max_speed ?? 3;
      const temp = device.assumed_indoor_temp_c;

      const speedBtns = (which, current) =>
        [1, 2, 3].map(n => `
          <button class="speed-btn ${current === n ? 'active' : ''}"
            onclick="setAutomationSpeed('${eid}', '${which}', ${n})">${n}</button>
        `).join('');

      const body = collapsed ? '' : `
        <div class="auto-row">
          <div class="auto-field">
            <span class="auto-field-label">Min</span>
            <div class="speed-btns">${speedBtns('min', min)}</div>
          </div>
          <div class="auto-field">
            <span class="auto-field-label">Max</span>
            <div class="speed-btns">${speedBtns('max', max)}</div>
          </div>
        </div>
        <div class="auto-temp-row">
          <span class="auto-field-label">Indoor temp</span>
          <input class="auto-temp-input" type="number" step="0.5"
            value="${temp != null ? temp : ''}"
            placeholder="20"
            onchange="saveAutomationTemp('${eid}', this.value)"> °C
          ${temp == null ? `<span class="auto-temp-note">(global default)</span>` : ''}
        </div>
      `;

      return `
        <div class="automation-section">
          <div class="automation-header">
            <button class="auto-toggle-btn" onclick="toggleAutomation('${eid}')">
              <i class="auto-chevron${collapsed ? ' collapsed' : ''}">▾</i> Automation
            </button>
            ${!collapsed
              ? (enabled
                ? `<button class="auto-disable-btn" onclick="disableAutomation('${eid}')">Disable</button>`
                : `<button class="auto-enable-btn" onclick="enableAutomation('${eid}')">Enable</button>`)
              : (enabled ? `<span class="pill on" style="font-size:0.65rem">ON</span>` : '')}
          </div>
          ${body}
        </div>
      `;
    }

    function renderCard(device) {
      const s = device.last_status;
      const isOn = s?.is_on;
      const eid = escapeHtml(device.id);
      const enickname = device.nickname != null ? escapeHtml(device.nickname) : null;

      const modes = [
        { key: 'one_way', label: 'One-way' },
        { key: 'two_way', label: 'Two-way' },
        { key: 'in',      label: 'Intake' },
      ];

      const stats = s ? `
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Speed</div>
            <div class="stat-value highlight">${s.speed ?? '—'}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Manual speed</div>
            <div class="stat-value">${s.manual_speed ?? '—'}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Humidity</div>
            <div class="stat-value">${s.humidity != null ? s.humidity + ' %' : '—'}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Abs. humidity</div>
            <div class="stat-value">${s.humidity != null ? absoluteHumidity(device.assumed_indoor_temp_c ?? 20, s.humidity).toFixed(1) + ' g/m³' : '—'}</div>
          </div>
        </div>
        <div class="mode-section">
          <div class="stat-label">Mode</div>
          <div class="mode-buttons">
            ${modes.map(m => `
              <button class="mode-btn ${s.ventilation_mode === m.key ? 'active' : ''}"
                onclick="setMode('${eid}', '${m.key}')">
                ${m.label}
              </button>`).join('')}
          </div>
        </div>
      ` : `<p class="no-status">No status yet — press Refresh.</p>`;

      const pillClass = device.unreachable ? 'unreachable' : (isOn ? 'on' : 'off');
      const pillText  = device.unreachable ? 'UNREACHABLE' : (isOn ? 'ON' : 'OFF');

      return `
        <div class="card${device.unreachable ? ' unreachable' : ''}" id="card-${eid}">
          <div class="card-header">
            <div style="min-width:0;flex:1;margin-right:0.5rem">
              <div id="name-${eid}" class="device-name"
                data-value="${enickname ?? ''}"
                onclick="startEditNickname('${eid}')">
                ${enickname ?? eid}
              </div>
              ${device.nickname ? `<div class="device-id">${eid}</div>` : ''}
              <div class="device-ip">${escapeHtml(device.ip)}</div>
            </div>
            ${s || device.unreachable ? `<span class="pill ${pillClass}">${pillText}</span>` : ''}
          </div>
          ${stats}
          <div class="speed-section">
            <div class="speed-header">
              <span class="speed-header-label">Speed</span>
              <span class="speed-header-value" id="speed-val-${eid}">${s?.speed ?? 1}</span>
            </div>
            <input type="range" min="1" max="3" value="${s?.speed ?? 1}"
              oninput="document.getElementById('speed-val-${eid}').textContent = this.value"
              onchange="setSpeed('${eid}', parseInt(this.value))">
          </div>
          ${renderAutomation(device)}
          <div class="card-footer">
            <button class="refreshBtn" onclick="refreshStatus('${eid}')">Refresh</button>
          </div>
        </div>
      `;
    }

    function render() {
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      const list = Object.values(devices).sort((a, b) => {
        const nameA = (a.nickname || a.id).toLowerCase();
        const nameB = (b.nickname || b.id).toLowerCase();
        return nameA.localeCompare(nameB);
      });
      if (list.length === 0) {
        grid.innerHTML = '';
        empty.hidden = false;
        return;
      }
      empty.hidden = true;
      for (const device of list) {
        // Don't re-render a card while the user is editing its nickname or automation temp.
        const editing = document.querySelector(`#card-${CSS.escape(device.id)} input.device-name-input`)
                     || document.querySelector(`#card-${CSS.escape(device.id)} .auto-temp-input:focus`);
        if (editing) continue;

        const html = renderCard(device);
        const existing = document.getElementById(`card-${device.id}`);
        if (existing) {
          existing.outerHTML = html;
        } else {
          grid.insertAdjacentHTML('beforeend', html);
        }
      }
    }

    // Load known devices and outdoor conditions immediately.
    loadDevices().catch(() => {});
    loadOutdoor();
    setInterval(loadOutdoor, 5 * 60 * 1000);

    let disconnectTimer = null;
    let countdown = 0;
    let countdownInterval = null;

    function clearDisconnectTimer() {
      if (disconnectTimer) { clearTimeout(disconnectTimer); disconnectTimer = null; }
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
    }

    const REDIRECT_DELAY_S = 10;

    const stream = new EventSource('/devices/stream');
    stream.onmessage = (e) => {
      clearDisconnectTimer();
      setStatus('');
      const device = JSON.parse(e.data);
      devices[device.id] = device;
      render();
    };
    stream.onerror = () => {
      if (disconnectTimer) return; // already counting down
      countdown = REDIRECT_DELAY_S;
      setStatus(`Connection lost — redirecting to login in ${countdown}s…`);
      countdownInterval = setInterval(() => {
        countdown--;
        if (countdown > 0) {
          setStatus(`Connection lost — redirecting to login in ${countdown}s…`);
        }
      }, 1000);
      disconnectTimer = setTimeout(() => window.location.href = '/login', REDIRECT_DELAY_S * 1000);
    };
  </script>
</body>
</html>
